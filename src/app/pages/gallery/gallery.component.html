<div class="page-banner">
  <div class="container">
    <h1>Gallery</h1>
    <nav class="breadcrumb"><a routerLink="/">Home</a><i class="fas fa-chevron-right" style="font-size:10px"></i><span>Gallery</span></nav>
  </div>
</div>

<section class="section">
  <div class="container">
    <div class="text-center" style="margin-bottom:48px">
      <span class="section-badge">Our Work</span>
      <h2 class="section-title">Product <span style="color:var(--primary)">Gallery</span></h2>
      <div class="divider center"></div>
    </div>

    <!-- Filters -->
    <div class="gallery-filters">
      @for (f of filters; track f) {
        <button class="filter-btn" [class.active]="activeFilter() === f" (click)="setFilter(f)">
          {{ f === 'all' ? 'All' : f === 'flexible-packaging' ? 'Flexible Packaging' : f === 'labels' ? 'Labels' : 'Facility' }}
        </button>
      }
    </div>

    <!-- Grid -->
    <div class="gallery-grid">
      @for (img of filtered; track img.src; let i = $index) {
        <div class="gallery-item" (click)="openLightbox(img.src)" animateOnScroll="zoom-in" [delay]="(i % 4) * 75">
          <img [src]="img.src" [alt]="img.alt" loading="lazy"/>
          <div class="gallery-overlay">
            <i class="fas fa-expand"></i>
            <span>{{ img.alt }}</span>
          </div>
        </div>
      }
    </div>
  </div>
</section>

<!-- Lightbox -->
@if (lightboxOpen()) {
  <div class="lightbox" (click)="closeLightbox()">
    <button class="lb-close" (click)="closeLightbox()"><i class="fas fa-times"></i></button>
    <img [src]="lightboxImg()" alt="Gallery Image" (click)="$event.stopPropagation()"/>
  </div>
}
